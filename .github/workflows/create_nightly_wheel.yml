name: Build and publish stormpy nightly wheels

on:
  schedule:
    - cron: "0 2 * * *"   # nightly at 02:00 UTC
  workflow_dispatch:

permissions:
  contents: write  # required to push gh-pages

jobs:
  compute-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      stormpy_sha: ${{ steps.stormpy_sha.outputs.sha }}
    steps:
      - name: Checkout stormpy
        uses: actions/checkout@v7
        with:
          repository: stormchecker/stormpy
          ref: master
          path: stormpy-version
          fetch-depth: 1
          sparse-checkout: |
              lib/stormpy/_version.py
      - name: Get stormpy commit
        id: stormpy_sha
        run: echo "sha=$(git -C stormpy-version rev-parse HEAD)" >> "$GITHUB_OUTPUT"
      - name: Extract base version
        id: base
        run: |
          BASE_VERSION=$(python - << 'EOF'
          from pathlib import Path
          import re

          content = Path("stormpy-version/lib/stormpy/_version.py").read_text()
          print(re.search(r'__version__\s*=\s*"([^"]+)"', content).group(1))
          EOF
          )
          echo "Base version: $BASE_VERSION"
          echo "base_version=$BASE_VERSION" >> "$GITHUB_OUTPUT"

      - name: Compute nightly version
        id: version
        run: |
          DATE=$(date -u +%Y%m%d)
          BASE=${{ steps.base.outputs.base_version }}
          MAJOR=$(echo "$BASE" | cut -d. -f1)
          MINOR=$(echo "$BASE" | cut -d. -f2)
          PATCH=$(echo "$BASE" | cut -d. -f3)
          NIGHTLY="${MAJOR}.${MINOR}.$((PATCH + 1)).dev${DATE}"
          echo "Stormpy nightly version: $NIGHTLY"
          echo "version=$NIGHTLY" >> "$GITHUB_OUTPUT"


  build-wheels:
    needs: compute-version
    strategy:
      matrix:
        config:
          - build_type: Release
            version_suffix: ""
          - build_type: Debug
            version_suffix: "+debug"
    uses: stormchecker/stormpy/.github/workflows/create_wheel.yml@master
    with:
      storm_version: master
      version: ${{ needs.compute-version.outputs.version }}${{ matrix.config.version_suffix }}
      full_build: false
      build_type: ${{ matrix.config.build_type }}
      repo: stormchecker/stormpy
      ref: master


  release:
    needs: [build-wheels, compute-version]
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      GH_REPO: ${{ github.repository }}

    steps:
      - name: Download built wheels
        uses: actions/download-artifact@v8
        with:
          pattern: stormpy-wheels-*
          path: wheelhouse
          merge-multiple: true
      - name: Delete existing assets (avoid duplicates)
        run: |
          gh release view nightly >/dev/null 2>&1 || \
            gh release create nightly --prerelease -t "Nightly build"
          ASSETS=$(gh release view nightly --json assets -q '.assets[].name')
          for a in $ASSETS; do
            gh release delete-asset nightly "$a" -y
          done
      - name: Upload nightly release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: nightly
          name: Nightly build
          body: Automated nightly build from stormchecker/stormpy@${{ needs.compute-version.outputs.stormpy_sha }}
          prerelease: true
          files: wheelhouse/*.whl


  create-index:
    name: Create index for nightly wheels
    needs: release
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      GH_REPO: ${{ github.repository }}

    steps:
      - name: Checkout gh-pages
        uses: actions/checkout@v7
        with:
          ref: gh-pages
          path: gh-pages
      - name: Download release asset list
        id: assets
        run: |
          gh release view nightly --json assets -q '.assets[].name' > assets.txt
          if [ -s assets.txt ]; then
            echo "has_assets=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_assets=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Generate index
        if: steps.assets.outputs.has_assets == 'true'
        run: |
          mkdir -p gh-pages/simple/stormpy
          echo "<!DOCTYPE html><html><body>" > gh-pages/simple/stormpy/index.html
          while read file; do
            case "$file" in *+debug*) continue ;; esac
            url="https://github.com/${{ github.repository }}/releases/download/nightly/$file"
            echo "<a href=\"$url\">$file</a><br>" >> gh-pages/simple/stormpy/index.html
          done < assets.txt
          echo "</body></html>" >> gh-pages/simple/stormpy/index.html
      - name: Generate debug index
        if: steps.assets.outputs.has_assets == 'true'
        run: |
          mkdir -p gh-pages/simple-debug/stormpy
          echo "<!DOCTYPE html><html><body>" > gh-pages/simple-debug/stormpy/index.html
          while read file; do
            case "$file" in *+debug*) ;; *) continue ;; esac
            url="https://github.com/${{ github.repository }}/releases/download/nightly/$file"
            echo "<a href=\"$url\">$file</a><br>" >> gh-pages/simple-debug/stormpy/index.html
          done < assets.txt
          echo "</body></html>" >> gh-pages/simple-debug/stormpy/index.html
      - name: Generate root index
        if: steps.assets.outputs.has_assets == 'true'
        run: |
          mkdir -p gh-pages/simple
          cat <<EOF > gh-pages/simple/index.html
          <!DOCTYPE html>
          <html>
            <body>
              <a href="stormpy/">stormpy</a>
            </body>
          </html>
          EOF
      - name: Generate debug root index
        if: steps.assets.outputs.has_assets == 'true'
        run: |
          mkdir -p gh-pages/simple-debug
          cat <<EOF > gh-pages/simple-debug/index.html
          <!DOCTYPE html>
          <html>
            <body>
              <a href="stormpy/">stormpy (debug)</a>
            </body>
          </html>
          EOF
      - name: Deploy to gh-pages
        if: steps.assets.outputs.has_assets == 'true'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: gh-pages
          force_orphan: true
